kind = "slides"
previewPath = "/property-manager-slides/"
title = "Property Manager AI - Deck"
version = "1.0.0"
id = "artifacts/property-manager-slides"
router = "path"

[[integratedSkills]]
name = "slides"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/property-manager-slides/" ]
localPort = 20972

[services.development]
run = "pnpm --filter @workspace/property-manager-slides run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/property-manager-slides", "run", "build" ]
publicDir = "artifacts/property-manager-slides/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20972"
BASE_PATH = "/property-manager-slides/"
